# https://moonrepo.dev/docs/config/project
# yaml-language-server: $schema=https://moonrepo.dev/schemas/project.json
$schema: "https://moonrepo.dev/schemas/project.json"

layer: application
language: typescript
stack: frontend
tags: ["app"]

id: "tanstack-start"

project:
  title: "tanstack-start"
  description: "_CHANGE_ME_DESCRIPTION_"

tasks:
  dev:
    command: "pnpm run dev"
    deps: ["prebuild"]
    options:
      runDepsInParallel: false
      envFile: ".env"

  build:
    command: "pnpm run build"
    deps: ["prebuild"]
    options:
      runDepsInParallel: false
      cache: true

  typecheck:
    command: "pnpm run typecheck"
    deps: ["prebuild"]
    options:
      cache: true

  typegen:
    command: "pnpm run typegen"
    options:
      cache: true

  prebuild:
    deps: ["shared-ui:build", "typegen"]
    options:
      cache: true

  docker-build:
    script: |
      DOCKER_IMAGE="$(jq -r .name <$workspaceRoot'/package.json')-$project" \
      DOCKER_IMAGE_VERSION="$(jq -r .version <$workspaceRoot'/package.json')" \
      && docker build -f $projectRoot/Dockerfile . -t $DOCKER_IMAGE:$DOCKER_IMAGE_VERSION \
      && docker image list --filter reference=$DOCKER_IMAGE\*
    options:
      mergeEnv: replace
      runFromWorkspaceRoot: true
      interactive: false
      outputStyle: stream
      runInCI: false
      cache: false
      shell: true

  docker-run:
    script: |
      DOCKER_IMAGE="$(jq -r .name <$workspaceRoot'/package.json')-$project" \
      DOCKER_IMAGE_VERSION="$(jq -r .version <$workspaceRoot'/package.json')" \
      && docker run --network=host --rm -it --env-file $projectRoot/.env \
        --name $DOCKER_IMAGE $DOCKER_IMAGE:$DOCKER_IMAGE_VERSION
    options:
      mergeEnv: replace
      outputStyle: stream
      runFromWorkspaceRoot: true
      interactive: true
      runInCI: false
      cache: false
      shell: true

  docker-shell:
    script: |
      DOCKER_IMAGE="$(jq -r .name <$workspaceRoot'/package.json')-$project" \
      DOCKER_IMAGE_VERSION="$(jq -r .version <$workspaceRoot'/package.json')" \
      && docker run --network=host --rm -it --env-file $projectRoot/.env \
        --entrypoint sh $DOCKER_IMAGE:$DOCKER_IMAGE_VERSION
    options:
      mergeEnv: replace
      runFromWorkspaceRoot: true
      outputStyle: stream
      interactive: true
      runInCI: false
      cache: false
      shell: true
